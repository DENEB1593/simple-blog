server:
  port: 8080

spring:
  application:
    name: simple-blog

  h2:
    console:
      enabled: true
      path: /h2-console

  datasource:
    driver-class-name: org.h2.Driver
    url: jdbc:h2:mem:simpleblog;MODE=MariaDB
    username: sa
    password:

  jpa:
    generate-ddl: true
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    open-in-view: false